[pytest]
addopts = -p no:anyio
# testpaths — where to look for tests. Core tests live in tests/; plugin
# tests live at plugins/<name>/tests/ per the 2026-04-22 convention. Each
# plugin ships its own tests so they travel with the plugin (install/
# uninstall preserves the tests, plugin authors maintain alongside code).
testpaths = tests plugins
python_files = test_*.py *_test.py
# Don't crawl directories that aren't ours or aren't code.
norecursedirs = user infra tmp .venv __pycache__ *.egg-info node_modules .git
